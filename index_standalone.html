<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>랜덤 발표자 추출</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Pretendard:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
      --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      --accent-color: #8b5cf6;
      --accent-glow: 0 0 20px rgba(139, 92, 246, 0.6);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --danger: #ef4444;
      --success: #10b981;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Pretendard', 'Outfit', sans-serif;
      background: var(--bg-gradient);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex; justify-content: center; align-items: center;
      overflow-x: hidden;
    }
    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 24px; box-shadow: var(--glass-shadow); padding: 2rem;
    }
    .btn {
      background: var(--accent-color); color: white; border: none;
      padding: 0.75rem 1.5rem; border-radius: 12px; font-weight: 600;
      font-size: 1rem; cursor: pointer; transition: all 0.3s ease;
      box-shadow: var(--accent-glow); font-family: inherit;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 0 30px rgba(139, 92, 246, 0.8); background: #7c3aed; }
    .btn.danger { background: rgba(239, 68, 68, 0.2); color: var(--danger); box-shadow: none; border: 1px solid rgba(239, 68, 68, 0.3); }
    .btn.danger:hover { background: rgba(239, 68, 68, 0.3); box-shadow: 0 0 20px rgba(239, 68, 68, 0.4); }
    input, textarea {
      width: 100%; background: rgba(0, 0, 0, 0.2); border: 1px solid var(--glass-border);
      border-radius: 12px; padding: 0.75rem 1rem; color: white; font-family: inherit; font-size: 1rem;
      transition: all 0.3s ease;
    }
    input:focus, textarea:focus { outline: none; border-color: var(--accent-color); box-shadow: 0 0 10px rgba(139, 92, 246, 0.3); }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.3); }
    .fade-in { animation: fadeIn 0.5s ease forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function useLocalStorage(key, initialValue) {
      const [storedValue, setStoredValue] = useState(() => {
        try {
          const item = window.localStorage.getItem(key);
          return item ? JSON.parse(item) : initialValue;
        } catch (error) { return initialValue; }
      });
      useEffect(() => {
        try { window.localStorage.setItem(key, JSON.stringify(storedValue)); } catch (error) {}
      }, [key, storedValue]);
      return [storedValue, setStoredValue];
    }

    function StudentList({ students, setStudents }) {
      const [inputText, setInputText] = useState('');
      const handleAdd = () => {
        if (!inputText.trim()) return;
        const newNames = inputText.split(/,|\n/).map(name => name.trim()).filter(name => name !== '' && !students.includes(name));
        if (newNames.length > 0) { setStudents([...students, ...newNames]); setInputText(''); }
      };
      const handleRemove = (nameToRemove) => setStudents(students.filter(name => name !== nameToRemove));
      const handleClear = () => { if (window.confirm('모든 명단을 삭제하시겠습니까?')) setStudents([]); };
      return (
        <div className="glass-panel" style={{ width: '100%', maxWidth: '400px', display: 'flex', flexDirection: 'column', gap: '1rem' }}>
          <h2 style={{ fontSize: '1.25rem', fontWeight: 600 }}>명단 관리</h2>
          <div style={{ display: 'flex', flexDirection: 'column', gap: '0.5rem' }}>
            <textarea value={inputText} onChange={(e) => setInputText(e.target.value)} placeholder="이름 입력 (쉼표 또는 줄바꿈 구분)" rows={3} style={{ resize: 'vertical' }} />
            <button className="btn" onClick={handleAdd}>추가하기</button>
          </div>
          <div style={{ marginTop: '1rem', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <span style={{ color: 'var(--text-secondary)', fontSize: '0.9rem' }}>총 {students.length}명</span>
            {students.length > 0 && <button className="btn danger" style={{ padding: '0.4rem 0.8rem', fontSize: '0.8rem' }} onClick={handleClear}>전체 삭제</button>}
          </div>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: '0.5rem', maxHeight: '200px', overflowY: 'auto', padding: '0.5rem 0' }}>
            {students.map((student, index) => (
              <div key={index} style={{ background: 'rgba(255,255,255,0.1)', padding: '0.25rem 0.75rem', borderRadius: '20px', display: 'flex', alignItems: 'center', gap: '0.5rem', fontSize: '0.9rem', animation: 'fadeIn 0.3s ease' }}>
                <span>{student}</span>
                <button onClick={() => handleRemove(student)} style={{ background: 'transparent', border: 'none', color: 'var(--danger)', cursor: 'pointer', fontSize: '1rem' }}>&times;</button>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function Controls({ count, setCount, onStart, disabled, maxCount }) {
      return (
        <div className="glass-panel" style={{ width: '100%', maxWidth: '400px', display: 'flex', flexDirection: 'column', gap: '1rem', marginTop: '1rem' }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
            <label htmlFor="count" style={{ fontWeight: 600 }}>뽑을 인원 (명)</label>
            <input id="count" type="number" min="1" max={maxCount || 1} value={count} onChange={(e) => setCount(Math.min(Math.max(1, parseInt(e.target.value) || 1), maxCount))} style={{ width: '80px', textAlign: 'center' }} disabled={disabled} />
          </div>
          <button className="btn" onClick={onStart} disabled={disabled || maxCount === 0} style={{ opacity: disabled || maxCount === 0 ? 0.5 : 1, padding: '1rem', fontSize: '1.2rem' }}>발표자 뽑기 시작!</button>
        </div>
      );
    }

    function SlotMachine({ students, isSpinning, onStop, forcedWinner }) {
      const [currentName, setCurrentName] = useState('?');
      const [speed, setSpeed] = useState(50);
      useEffect(() => {
        let interval;
        if (isSpinning && students.length > 0) {
          interval = setInterval(() => { setCurrentName(students[Math.floor(Math.random() * students.length)]); }, speed);
          const slowDownTimeout1 = setTimeout(() => setSpeed(100), 1000);
          const slowDownTimeout2 = setTimeout(() => setSpeed(250), 2000);
          const stopTimeout = setTimeout(() => {
            clearInterval(interval);
            const finalWinner = forcedWinner || students[Math.floor(Math.random() * students.length)];
            setCurrentName(finalWinner);
            onStop(finalWinner);
          }, 3000);
          return () => { clearInterval(interval); clearTimeout(slowDownTimeout1); clearTimeout(slowDownTimeout2); clearTimeout(stopTimeout); setSpeed(50); };
        } else if (!isSpinning) { setCurrentName('?'); }
      }, [isSpinning, students, forcedWinner]);

      return (
        <div style={{ width: '100%', height: '150px', background: 'linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.15) 50%, rgba(255,255,255,0.05) 100%)', border: '2px solid var(--accent-color)', borderRadius: '24px', display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: 'inset 0 0 20px rgba(0,0,0,0.5), 0 0 20px rgba(139, 92, 246, 0.4)', position: 'relative', overflow: 'hidden' }}>
          <div style={{ fontSize: '3rem', fontWeight: 800, color: isSpinning ? 'rgba(255,255,255,0.8)' : '#fbbf24', textShadow: isSpinning ? 'none' : '0 0 20px rgba(251, 191, 36, 0.8)', transition: 'color 0.3s ease, text-shadow 0.3s ease', zIndex: 2, animation: isSpinning ? 'float 0.1s infinite alternate' : 'none' }}>{currentName}</div>
        </div>
      );
    }

    function SecretModal({ isOpen, onClose, secretOrder, setSecretOrder, availableStudents }) {
      const [inputText, setInputText] = useState('');
      if (!isOpen) return null;
      const handleSave = () => {
        const names = inputText.split(/,|\n/).map(n => n.trim()).filter(n => n !== '');
        const invalidNames = names.filter(name => !availableStudents.includes(name));
        if (invalidNames.length > 0 && !window.confirm(`다음 이름들은 현재 명단에 없습니다: ${invalidNames.join(', ')}\n그래도 저장하시겠습니까?`)) return;
        setSecretOrder(names); onClose();
      };
      const handleClear = () => { setSecretOrder([]); setInputText(''); };
      return (
        <div style={{ position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, background: 'rgba(0,0,0,0.8)', backdropFilter: 'blur(8px)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 1000 }}>
          <div className="glass-panel fade-in" style={{ width: '90%', maxWidth: '400px' }}>
            <h2 style={{ color: 'var(--danger)', marginBottom: '1rem' }}>비밀 순서 설정 (교사용)</h2>
            <p style={{ fontSize: '0.9rem', color: 'var(--text-secondary)', marginBottom: '1rem' }}>입력한 순서대로 뽑히게 됩니다.<br/>(쉼표 또는 줄바꿈으로 구분)</p>
            <textarea value={inputText} onChange={(e) => setInputText(e.target.value)} placeholder="예: 홍길동, 김철수, 이영희" rows={4} style={{ marginBottom: '1rem', resize: 'vertical' }} />
            {secretOrder.length > 0 && <div style={{ marginBottom: '1rem', fontSize: '0.9rem' }}>현재 순서: <br/><span style={{ color: '#fbbf24' }}>{secretOrder.join(' ➔ ')}</span></div>}
            <div style={{ display: 'flex', gap: '0.5rem', justifyContent: 'flex-end' }}>
              <button className="btn danger" onClick={handleClear}>초기화</button>
              <button className="btn" onClick={onClose} style={{ background: 'transparent', border: '1px solid var(--glass-border)' }}>취소</button>
              <button className="btn" onClick={handleSave}>저장</button>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [students, setStudents] = useLocalStorage('random_presenter_students', []);
      const [secretOrder, setSecretOrder] = useLocalStorage('random_presenter_secret_order', []);
      const [count, setCount] = useState(1);
      const [winners, setWinners] = useState([]);
      const [isSpinning, setIsSpinning] = useState(false);
      const [currentSpinIndex, setCurrentSpinIndex] = useState(0);
      const [isSecretModalOpen, setIsSecretModalOpen] = useState(false);
      const logoClickCount = useRef(0);
      const clickTimeout = useRef(null);

      const handleLogoClick = () => {
        logoClickCount.current += 1;
        if (clickTimeout.current) clearTimeout(clickTimeout.current);
        if (logoClickCount.current >= 5) { setIsSecretModalOpen(true); logoClickCount.current = 0; }
        else { clickTimeout.current = setTimeout(() => { logoClickCount.current = 0; }, 1000); }
      };

      const startPicking = () => {
        if (students.length === 0) return alert('학생 명단을 추가해주세요.');
        if (count > students.length) return alert('뽑을 인원이 전체 학생 수보다 많습니다.');
        setWinners([]); setCurrentSpinIndex(0); setIsSpinning(true);
      };

      const handleStopSpin = (winner) => {
        setWinners(prev => [...prev, winner]);
        if (secretOrder.length > 0) setSecretOrder(prev => prev.slice(1));
        setTimeout(() => {
          if (currentSpinIndex + 1 < count) { setCurrentSpinIndex(prev => prev + 1); setIsSpinning(true); }
          else { setIsSpinning(false); }
        }, 1000);
      };

      const availableForSpin = students.filter(s => !winners.includes(s));
      const forcedWinner = secretOrder.length > 0 ? secretOrder[0] : null;

      return (
        <div style={{ width: '100%', maxWidth: '800px', margin: '0 auto', padding: '2rem', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '2rem' }}>
          <div onClick={handleLogoClick} style={{ cursor: 'default', userSelect: 'none', textAlign: 'center', animation: 'fadeIn 0.5s ease' }}>
            <h1 style={{ fontSize: '2.5rem', background: 'linear-gradient(to right, #a855f7, #ec4899)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', marginBottom: '0.5rem' }}>랜덤 발표자 추출</h1>
            <p style={{ color: 'var(--text-secondary)' }}>두근두근, 다음 발표자는 누구일까요?</p>
          </div>
          <div style={{ width: '100%', display: 'flex', flexDirection: 'column', gap: '2rem', alignItems: 'center' }}>
            <div style={{ width: '100%', maxWidth: '600px' }}>
              <SlotMachine students={availableForSpin} isSpinning={isSpinning} onStop={handleStopSpin} forcedWinner={forcedWinner} />
              {winners.length > 0 && (
                <div className="fade-in" style={{ marginTop: '1.5rem', textAlign: 'center' }}>
                  <h3 style={{ marginBottom: '1rem', color: 'var(--text-secondary)' }}>🎉 당첨자 🎉</h3>
                  <div style={{ display: 'flex', flexWrap: 'wrap', gap: '1rem', justifyContent: 'center' }}>
                    {winners.map((winner, idx) => (
                      <div key={idx} className="glass-panel fade-in" style={{ padding: '1rem 2rem', fontSize: '1.5rem', fontWeight: 'bold', background: 'rgba(139, 92, 246, 0.2)', borderColor: 'var(--accent-color)', animationDelay: `${idx * 0.1}s` }}>{winner}</div>
                    ))}
                  </div>
                </div>
              )}
            </div>
            <div style={{ width: '100%', display: 'flex', flexWrap: 'wrap', gap: '2rem', justifyContent: 'center' }}>
              <StudentList students={students} setStudents={setStudents} />
              <div style={{ flex: 1, minWidth: '300px', maxWidth: '400px' }}>
                <Controls count={count} setCount={setCount} onStart={startPicking} disabled={isSpinning || students.length === 0} maxCount={students.length} />
              </div>
            </div>
          </div>
          <SecretModal isOpen={isSecretModalOpen} onClose={() => setIsSecretModalOpen(false)} secretOrder={secretOrder} setSecretOrder={setSecretOrder} availableStudents={students} />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
